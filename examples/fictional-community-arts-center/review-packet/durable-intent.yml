schema_version: public-kit.1
site: "Fictional Community Arts Center"
intent_records:
  - id: "intent-events-as-content-type"
    target_config: "node.type.event"
    purpose: "Preserve event records as reusable editorial content rather than hardcoded listing cards."
    source_evidence:
      - "Fictional /events route shows repeatable event cards with date, venue, audience, and registration patterns."
      - "Fictional homepage promotes upcoming events from the same pattern."
    rationale: "Events need filtering, date sorting, related homepage blocks, and editor ownership. A Drupal content type plus Views supports those requirements better than static cards."
    asserted_by: "example"
    last_reviewed: "2026-06-30"
    config_hash: "UNKNOWN"
    status: "draft"
    stale_behavior: "treat_as_no_intent"
  - id: "intent-donation-provider-blocked"
    target_config: "integration.donation_provider"
    purpose: "Prevent invented donation handling and preserve the need for provider credentials, privacy review, and target proof."
    source_evidence:
      - "Fictional /donate route depends on an external donation provider."
    rationale: "The target can model the call to action and external link field, but provider credentials, privacy review, and payment/donation handling require human and provider evidence."
    asserted_by: "example"
    last_reviewed: "2026-06-30"
    config_hash: "UNKNOWN"
    status: "blocked"
    stale_behavior: "treat_as_no_intent"
evidence_scope: "Durable intent guides review when current, hash-validated, and accepted."
