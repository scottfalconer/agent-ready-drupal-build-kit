schema_version: public-kit.1
site: ""
# Leave `intent_records: []` only when pattern-map.json declares no content types
# or Views and no off-road exceptions are recorded. Otherwise either append intent
# records or add a structured empty-intent disposition:
# empty_justification:
#   rationale: ""
#   accepted_by: ""
#   last_reviewed: ""
#   acceptance_evidence: ""
intent_records:
  - id: ""
    target_config: ""
    purpose: ""
    source_evidence: []
    rationale: ""
    asserted_by: ""
    last_reviewed: ""
    config_hash: "" # sha256:<64 lowercase hex chars> or not-applicable
    status: "draft" # draft | hash-valid | accepted | superseded
    stale_behavior: "treat_as_no_intent"
evidence_scope: "Durable intent guides review when current and hash-validated. Only human maintainer review should mark intent accepted."
